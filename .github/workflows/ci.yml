name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (editable) with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,uncertainty]"

      - name: Repo hygiene check (no unfixed corruption, SPDX headers present)
        run: |
          python scripts/repo_hygiene.py --check

      - name: Run tests
        run: |
          python -m pytest -v

      - name: Stage-1 latency exit gate
        # Not fatal on CI runners (which have variable perf) — advisory only.
        continue-on-error: true
        run: |
          python benchmarks/bench_milp.py

  lint:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,uncertainty]"
      - name: ruff
        run: python -m ruff check src/ tests/ benchmarks/
      - name: mypy
        run: python -m mypy src/nimbus_c2
